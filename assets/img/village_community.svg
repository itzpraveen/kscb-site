<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DCEDC8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5E1A5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#groundGradient)"/>
  
  <!-- Big Banyan Tree -->
  <g transform="translate(200, 280)">
    <path d="M-20,0 L-20,-150 Q-40,-200 -80,-220" stroke="#5D4037" stroke-width="25" fill="none"/>
    <path d="M20,0 L20,-140 Q40,-190 80,-210" stroke="#5D4037" stroke-width="25" fill="none"/>
    <path d="M0,0 V-160" stroke="#5D4037" stroke-width="30" fill="none"/>
    
    <!-- Canopy -->
    <circle cx="0" cy="-200" r="80" fill="#43A047" opacity="0.9"/>
    <circle cx="-60" cy="-180" r="60" fill="#66BB6A" opacity="0.9"/>
    <circle cx="60" cy="-180" r="60" fill="#66BB6A" opacity="0.9"/>
    <circle cx="0" cy="-240" r="70" fill="#2E7D32" opacity="0.8"/>
  </g>
  
  <!-- Crowd -->
  <g transform="translate(100, 220)">
    <!-- Person 1 -->
    <circle cx="0" cy="0" r="12" fill="#FF7043"/>
    <path d="M-12,10 Q0,35 12,10" fill="#FF7043"/>
    
    <!-- Person 2 -->
    <g transform="translate(40, 10)">
      <circle cx="0" cy="0" r="12" fill="#5C6BC0"/>
      <path d="M-12,10 Q0,35 12,10" fill="#5C6BC0"/>
    </g>
    
    <!-- Person 3 -->
    <g transform="translate(80, 0)">
      <circle cx="0" cy="0" r="12" fill="#EC407A"/>
      <path d="M-12,10 Q0,35 12,10" fill="#EC407A"/>
    </g>
    
    <!-- Person 4 -->
    <g transform="translate(120, 10)">
      <circle cx="0" cy="0" r="12" fill="#FFA726"/>
      <path d="M-12,10 Q0,35 12,10" fill="#FFA726"/>
    </g>
    
    <!-- Person 5 -->
    <g transform="translate(160, 0)">
      <circle cx="0" cy="0" r="12" fill="#78909C"/>
      <path d="M-12,10 Q0,35 12,10" fill="#78909C"/>
    </g>
  </g>
  
  <!-- Speaker -->
  <g transform="translate(200, 180)">
    <rect x="-15" y="20" width="30" height="40" fill="#333"/> <!-- Podium -->
    <circle cx="0" cy="0" r="14" fill="#8D6E63"/> <!-- Head -->
    <rect x="-12" y="14" width="24" height="20" fill="#FFF"/> <!-- Shirt -->
  </g>
</svg>
