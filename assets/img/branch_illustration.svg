<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4faf5" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#sky)" />
  
  <!-- Ground -->
  <rect x="0" y="350" width="600" height="50" fill="#e3e8ef" />
  
  <!-- Building -->
  <rect x="150" y="150" width="300" height="200" fill="#fff" stroke="#e3e8ef" stroke-width="2" />
  
  <!-- Roof -->
  <path d="M130 150 L300 80 L470 150 Z" fill="#11863A" />
  
  <!-- Columns -->
  <rect x="180" y="150" width="20" height="200" fill="#f4faf5" />
  <rect x="240" y="150" width="20" height="200" fill="#f4faf5" />
  <rect x="340" y="150" width="20" height="200" fill="#f4faf5" />
  <rect x="400" y="150" width="20" height="200" fill="#f4faf5" />
  
  <!-- Door -->
  <rect x="280" y="250" width="40" height="100" fill="#4E2F8A" opacity="0.8" />
  
  <!-- Signage -->
  <rect x="200" y="180" width="200" height="30" fill="#fff" stroke="#11863A" rx="4" />
  <rect x="220" y="190" width="160" height="10" fill="#11863A" opacity="0.2" />
  
  <!-- Trees -->
  <circle cx="100" cy="320" r="40" fill="#11863A" opacity="0.8" />
  <rect x="90" y="320" width="20" height="60" fill="#5b6677" />
  
  <circle cx="500" cy="320" r="40" fill="#11863A" opacity="0.8" />
  <rect x="490" y="320" width="20" height="60" fill="#5b6677" />
  
  <!-- Sun -->
  <circle cx="500" cy="80" r="30" fill="#F2D024" opacity="0.4" />
</svg>
