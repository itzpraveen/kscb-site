<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="wallGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#E8F5E9"/>
  
  <!-- Building -->
  <g transform="translate(50, 50)">
    <!-- Main Wall -->
    <rect x="0" y="50" width="300" height="180" fill="url(#wallGradient)" stroke="#5D4037" stroke-width="2"/>
    
    <!-- Roof -->
    <path d="M-20,50 L150,0 L320,50 Z" fill="#D84315" stroke="#3E2723" stroke-width="2"/>
    
    <!-- Pillars -->
    <rect x="20" y="50" width="20" height="180" fill="#D7CCC8" stroke="#A1887F"/>
    <rect x="260" y="50" width="20" height="180" fill="#D7CCC8" stroke="#A1887F"/>
    
    <!-- Entrance -->
    <rect x="110" y="100" width="80" height="130" fill="#CFD8DC"/>
    <rect x="110" y="100" width="40" height="130" fill="none" stroke="#546E7A" stroke-width="2"/>
    <rect x="150" y="100" width="40" height="130" fill="none" stroke="#546E7A" stroke-width="2"/>
    
    <!-- Signboard -->
    <rect x="80" y="70" width="140" height="30" fill="#2E7D32" rx="4"/>
    <text x="150" y="90" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FFF" text-anchor="middle">BRANCH</text>
    
    <!-- Plants -->
    <g transform="translate(10, 230)">
      <circle cx="10" cy="0" r="15" fill="#4CAF50"/>
      <circle cx="30" cy="-10" r="18" fill="#66BB6A"/>
      <circle cx="50" cy="0" r="15" fill="#4CAF50"/>
      <rect x="10" y="0" width="40" height="20" fill="#795548"/>
    </g>
    
    <g transform="translate(230, 230)">
      <circle cx="10" cy="0" r="15" fill="#4CAF50"/>
      <circle cx="30" cy="-10" r="18" fill="#66BB6A"/>
      <circle cx="50" cy="0" r="15" fill="#4CAF50"/>
      <rect x="10" y="0" width="40" height="20" fill="#795548"/>
    </g>
  </g>
</svg>
